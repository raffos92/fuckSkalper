<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Monitor</title>
<style>
  :root {
    --bg: #0F1014; --card: #1A1D24; --card-border: #252932;
    --line: #1F2430; --text: #E5E7EB; --muted: #6B7280; --dim: #374151;
    --amber: #F59E0B; --amber-soft: rgba(245,158,11,0.12);
    --green: #10B981; --blue: #3B82F6; --red: #EF4444;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; flex-shrink: 0; background: #13161C; border-right: 1px solid var(--line);
             display: flex; flex-direction: column; }
  .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--line); display: flex; gap: 8px; align-items: center; }
  .sidebar-logo .name { font-size: 14px; font-weight: 700; color: #fff; }
  .sidebar-logo .ver { font-size: 11px; color: var(--dim); }
  .nav { flex: 1; padding: 16px 12px; }
  .nav-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
              font-size: 14px; color: var(--muted); background: transparent; border: none; cursor: pointer; margin-bottom: 2px; text-align: left; }
  .nav-item.active { background: var(--amber-soft); color: var(--amber); }
  .nav-item .ico { width: 16px; text-align: center; }
  .nav-item .label { flex: 1; }
  .nav-badge { font-size: 11px; padding: 1px 6px; border-radius: 99px; background: #252932; color: var(--muted); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--line); font-size: 11px; color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Main */
  main { flex: 1; overflow-y: auto; }
  .page { padding: 24px; max-width: 720px; }
  h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 0 0 2px; }
  .subtitle { font-size: 13px; color: var(--muted); margin: 0 0 20px; }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 12px; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: monospace; }
  .stat-label { font-size: 13px; color: #fff; margin-top: 4px; }
  .stat-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  input[type=text], input[type=password] {
    width: 100%; background: #0F1014; border: 1px solid var(--card-border); border-radius: 8px;
    padding: 9px 12px; font-size: 13px; color: var(--text); outline: none; font-family: monospace;
  }
  input:focus { border-color: #F59E0B80; }
  label.field-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); display: block; margin-bottom: 6px; }

  .toggle { position: relative; width: 36px; height: 20px; border-radius: 99px; background: #4B5563; border: none; cursor: pointer; flex-shrink: 0; }
  .toggle.on { background: var(--amber); }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .15s; }
  .toggle.on .knob { transform: translateX(16px); }

  .btn { padding: 10px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--amber); color: #000; width: 100%; padding: 13px; font-size: 14px; }
  .btn-primary.saved { background: var(--green); color: #fff; }
  .btn-ghost { background: transparent; color: var(--dim); border: none; cursor: pointer; font-size: 13px; }
  .btn-ghost:hover { color: var(--red); }

  .pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .pill-mkt { font-family: monospace; background: #252932; color: #9CA3AF; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .type-choice { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
  .type-opt { text-align: left; padding: 12px; border-radius: 10px; border: 1px solid var(--card-border); background: transparent; cursor: pointer; }
  .type-opt.sel { border-color: #F59E0B80; background: var(--amber-soft); }
  .type-opt .t { font-size: 13px; font-weight: 600; color: #fff; }
  .type-opt .d { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .mkt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mkt-opt { display: flex; align-items: center; gap: 6px; padding: 9px; border-radius: 10px; border: 1px solid var(--card-border); background: transparent; cursor: pointer; font-size: 13px; color: #9CA3AF; }
  .mkt-opt.sel { border-color: #F59E0B80; background: var(--amber-soft); color: #FCD34D; }

  .monitor-card { border-left: 3px solid var(--blue); }
  .monitor-card.found { border-left-color: var(--green); }
  .monitor-card.off { border-left-color: var(--dim); opacity: .65; }

  .row { display: flex; align-items: center; gap: 8px; }
  .between { justify-content: space-between; }
  .detail-row { display: flex; gap: 8px; font-size: 12px; margin-bottom: 6px; align-items: center; }
  .detail-label { width: 64px; flex-shrink: 0; color: var(--muted); }
  .kw-pill { font-family: monospace; padding: 2px 8px; border-radius: 6px; color: var(--amber); background: rgba(245,158,11,0.1); }

  .log-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1A1D24; font-size: 12px; }
  .log-row:last-child { border: none; }
  .log-time { font-family: monospace; color: var(--dim); flex-shrink: 0; }
  .log-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .log-msg { color: #D1D5DB; }

  .empty { text-align: center; padding: 30px; color: var(--dim); font-size: 13px; }
  .error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--card-border);
           padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #252932; border-radius: 4px; }

  .tooltip-wrap { position: relative; display: inline-flex; align-items: center; }
  .tooltip-box {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); background: #13161C; border: 1px solid var(--card-border);
    border-radius: 10px; padding: 12px 14px; width: 230px; z-index: 200;
    font-size: 12px; line-height: 1.7; color: var(--text); pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .tooltip-wrap:hover .tooltip-box { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <span style="font-size:20px">🛒</span>
      <div>
        <div class="name">Amazon Monitor</div>
        <div class="ver">v1.0</div>
      </div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-footer">
      <div class="row"><span class="dot pulse" style="background:var(--green)"></span><span id="worker-status">Monitor attivo</span></div>
      <div id="last-cycle" style="margin-top:4px">—</div>
    </div>
  </div>
  <main><div class="page" id="page"></div></main>
</div>
<div class="toast" id="toast"></div>

<script>
const API = "";
let MARKETPLACES = {};
let state = { section: "dashboard", monitors: [], bundles: [], settings: {}, stats: {}, logs: [], blacklist: [] };

const NAV_ITEMS = [
  { id: "dashboard", icon: "◈", label: "Dashboard" },
  { id: "monitors",  icon: "⊡", label: "I miei Monitor", badged: true },
  { id: "add",       icon: "+", label: "Aggiungi Monitor" },
  { id: "bundles",   icon: "❋", label: "Pacchetti" },
  { id: "blacklist", icon: "🚫", label: "Blacklist", badged: true },
  { id: "settings",  icon: "◎", label: "Impostazioni" },
];

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: "Errore" }));
    throw new Error(err.error || "Errore");
  }
  return r.status === 204 ? null : r.json();
}

async function loadAll() {
  const [monitors, bundles, settings, stats, logs, mkts, blacklist] = await Promise.all([
    api("/api/monitors"), api("/api/bundles"), api("/api/settings"),
    api("/api/stats"), api("/api/logs?limit=20"), api("/api/marketplaces"),
    api("/api/blacklist"),
  ]);
  state.monitors = monitors; state.bundles = bundles; state.settings = settings;
  state.stats = stats; state.logs = logs; MARKETPLACES = mkts; state.blacklist = blacklist;
  document.getElementById("last-cycle").textContent = "Polling ogni " + stats.poll_interval_seconds + "s";
  render();
}

function setSection(id) { state.section = id; render(); }

function mktPills(codes) {
  return `<div class="chip-row">${codes.map(c => {
    const m = MARKETPLACES[c];
    return `<span class="pill pill-mkt">${m ? m.flag : ""} ${c}</span>`;
  }).join("")}</div>`;
}

const LEVEL_COLOR = {
  found:    "var(--green)",
  watching: "var(--blue)",
  check:    "var(--blue)",
  warning:  "var(--amber)",
  error:    "var(--red)",
  disabled: "var(--dim)",
  info:     "var(--dim)",
};
function levelColor(s) { return LEVEL_COLOR[s] || "var(--dim)"; }

function mktPillsWithStatus(codes, errors) {
  errors = errors || [];
  return `<div class="chip-row">${codes.map(c => {
    const m = MARKETPLACES[c];
    const failed = errors.includes(c);
    return `<span class="pill pill-mkt" style="${failed ? 'background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3)' : ''}">${m ? m.flag : ""} ${c}</span>`;
  }).join("")}</div>`;
}

// ── Render router ──────────────────────────────────────────────────────────

function render() {
  renderNav();
  const page = document.getElementById("page");
  if (state.section === "dashboard") page.innerHTML = renderDashboard();
  else if (state.section === "monitors") page.innerHTML = renderMonitors();
  else if (state.section === "add") page.innerHTML = renderAdd();
  else if (state.section === "bundles") page.innerHTML = renderBundles();
  else if (state.section === "blacklist") page.innerHTML = renderBlacklist();
  else if (state.section === "settings") page.innerHTML = renderSettings();
  attachHandlers();
}

function renderNav() {
  const badgeCounts = {
    monitors: state.monitors.filter(m => m.enabled).length,
    blacklist: state.blacklist.length,
  };
  document.getElementById("nav").innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-item ${state.section === item.id ? "active" : ""}" data-nav="${item.id}">
      <span class="ico">${item.icon}</span>
      <span class="label">${item.label}</span>
      ${item.badged ? `<span class="nav-badge">${badgeCounts[item.id] ?? 0}</span>` : ""}
    </button>
  `).join("");
}

// ── Dashboard ──────────────────────────────────────────────────────────────

function renderDashboard() {
  const s = state.stats;
  const stats = [
    { label: "Monitor attivi", value: s.active_monitors ?? 0, sub: `di ${s.total_monitors ?? 0} totali`, color: "var(--amber)" },
    { label: "Prodotti trovati", value: s.found_total ?? 0, sub: "totale storico", color: "var(--green)" },
    { label: "Polling ogni", value: (s.poll_interval_seconds ?? 60) + "s", sub: "intervallo check", color: "var(--blue)" },
  ];
  const allSources = [...state.monitors.filter(m => m.enabled), ...state.bundles.filter(b => b.enabled)];

  return `
    <h1>Dashboard</h1>
    <p class="subtitle">Stato in tempo reale dei tuoi monitor</p>
    <div class="stats-grid">
      ${stats.map(st => `
        <div class="card">
          <div class="stat-value" style="color:${st.color}">${st.value}</div>
          <div class="stat-label">${st.label}</div>
          <div class="stat-sub">${st.sub}</div>
        </div>`).join("")}
    </div>

    <div class="card" style="padding:0">
      <div style="padding:14px 16px" class="section-label">Sorgenti attive</div>
      ${allSources.length === 0 ? `<div class="empty">Nessun monitor o pacchetto attivo</div>` :
        allSources.map((src, i) => `
          <div class="row between" style="padding:12px 16px; ${i < allSources.length - 1 ? 'border-bottom:1px solid var(--line)' : ''}">
            <div class="row" style="gap:10px; min-width:0; flex:1">
              <span class="dot ${src.last_status === 'found' ? 'pulse' : ''}" style="background:${levelColor(src.last_status)}"></span>
              <div style="min-width:0">
                <div style="font-size:13px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${src.name}</div>
                <div style="font-size:11px; color:var(--dim)">${src.last_check ? new Date(src.last_check).toLocaleTimeString('it-IT') : 'mai controllato'}</div>
              </div>
            </div>
            ${mktPillsWithStatus(src.marketplaces || [], src.last_marketplace_errors || [])}
            ${src.found_count > 0 ? `<span class="pill" style="background:rgba(16,185,129,0.15); color:var(--green)">+${src.found_count}</span>` : ""}
          </div>`).join("")}
    </div>

    <div class="card" style="padding:0; margin-top:12px">
      <div style="padding:14px 16px" class="section-label">Log recente</div>
      ${state.logs.length === 0 ? `<div class="empty">Nessuna attività ancora</div>` :
        state.logs.map(l => `
          <div class="log-row" style="padding-left:16px; padding-right:16px">
            <span class="log-time">${new Date(l.ts).toLocaleTimeString('it-IT')}</span>
            <span class="log-dot" style="background:${levelColor(l.level)}"></span>
            <span class="log-msg">${l.message}</span>
          </div>`).join("")}
    </div>
  `;
}

// ── Monitors ───────────────────────────────────────────────────────────────

function renderMonitors() {
  return `
    <h1>I miei Monitor</h1>
    <p class="subtitle">${state.monitors.length} monitor configurati</p>
    ${state.monitors.length === 0 ? `<div class="card empty">Nessun monitor ancora. Vai su "Aggiungi Monitor" per crearne uno.</div>` :
      state.monitors.map(m => `
        <div class="card monitor-card ${m.last_status === 'found' ? 'found' : ''} ${!m.enabled ? 'off' : ''}">
          <div class="row between" style="margin-bottom:12px">
            <div class="row" style="gap:8px; min-width:0">
              <span class="dot ${m.last_status === 'found' && m.enabled ? 'pulse' : ''}" style="background:${m.enabled ? levelColor(m.last_status) : 'var(--dim)'}"></span>
              <span style="font-size:13px; font-weight:500; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${m.name}</span>
            </div>
            <div class="row" style="gap:8px; flex-shrink:0">
              <button class="btn-ghost" style="color:var(--muted)" data-edit-monitor="${m.id}" title="Modifica">✎</button>
              <button class="toggle ${m.enabled ? 'on' : ''}" data-toggle-monitor="${m.id}"><span class="knob"></span></button>
              <button class="btn-ghost" data-delete-monitor="${m.id}">✕</button>
            </div>
          </div>
          <div class="detail-row"><span class="detail-label">Ricerca</span>
            <span class="kw-pill">${m.type === 'keyword' ? '"' + m.keyword + '"' : m.type === 'asin' ? 'ASIN: ' + m.keyword : 'URL diretta'}</span></div>
          <div class="detail-row"><span class="detail-label">Mercati</span>${mktPills(m.marketplaces)}</div>
          ${m.type !== 'asin' ? `<div class="detail-row">
            <span class="detail-label">Filtri</span>
            <span class="pill" style="background:${m.sold_by_amazon ? 'rgba(59,130,246,0.15)' : '#252932'}; color:${m.sold_by_amazon ? '#60A5FA' : 'var(--muted)'}">${m.sold_by_amazon ? 'Solo Amazon' : 'Tutti i venditori'}</span>
            <span class="pill" style="background:${m.search_type !== 'normal' ? 'rgba(245,158,11,0.15)' : '#252932'}; color:${m.search_type !== 'normal' ? 'var(--amber)' : 'var(--muted)'}">${m.search_type === 'deals' ? '⚡ Offerte' : m.search_type === 'new' ? '🆕 Novità' : 'Normale'}</span>
          </div>` : ''}
          <div class="row between" style="margin-top:10px; padding-top:10px; border-top:1px solid var(--line)">
            <span style="font-size:11px; color:var(--dim)">Ultimo check: ${m.last_check ? new Date(m.last_check).toLocaleString('it-IT') : 'mai'}</span>
            ${m.found_count > 0 ? `<span class="pill" style="background:rgba(16,185,129,0.1); color:var(--green)">${m.found_count} trovati</span>` : ""}
          </div>
        </div>
      `).join("")}
  `;
}

// ── Add Monitor ────────────────────────────────────────────────────────────

let addState = { editId: null, type: "keyword", name: "", keyword: "", url: "", marketplaces: ["JP"], soldByAmazon: true, searchType: "new", pollInterval: "" };

function renderAdd() {
  const mktCodes = Object.keys(MARKETPLACES);
  const allSel = mktCodes.length > 0 && mktCodes.every(c => addState.marketplaces.includes(c));

  return `
    <h1>${addState.editId ? 'Modifica Monitor' : 'Aggiungi Monitor'}</h1>
    <p class="subtitle">${addState.editId ? 'Modifica la ricerca esistente' : 'Configura una nuova ricerca'}</p>

    <div class="card">
      <label class="field-label">Nome monitor</label>
      <input type="text" id="add-name" placeholder="es. CX-18 Takaratomy" value="${addState.name}">
    </div>

    <div class="card">
      <div class="section-label">Tipo ricerca</div>
      <div class="type-choice">
        <button class="type-opt ${addState.type === 'keyword' ? 'sel' : ''}" data-add-type="keyword">
          <div class="t">Parola chiave</div><div class="d">Cerca per nome/codice</div></button>
        <button class="type-opt ${addState.type === 'asin' ? 'sel' : ''}" data-add-type="asin">
          <div class="t">ASIN</div><div class="d">Prodotto specifico</div></button>
        <button class="type-opt ${addState.type === 'url' ? 'sel' : ''}" data-add-type="url">
          <div class="t">URL diretta</div><div class="d">Incolla link Amazon</div></button>
      </div>
    </div>

    <div class="card">
      <label class="field-label">${addState.type === 'keyword' ? 'Parola chiave' : addState.type === 'asin' ? 'ASIN Amazon' : 'URL Amazon'}</label>
      <input type="text" id="add-value"
        placeholder="${addState.type === 'keyword' ? 'es. CX-18 takaratomy' : addState.type === 'asin' ? 'es. B0D91K2WMS' : 'https://www.amazon.co.jp/s?k=...'}"
        value="${addState.type === 'url' ? addState.url : addState.keyword}">
      ${addState.type === 'asin' ? `<div style="font-size:11px; color:var(--muted); margin-top:6px">Trovi l'ASIN nell'URL del prodotto: amazon.co.jp/dp/<span style="color:var(--amber)">B0D91K2WMS</span></div>` : ''}
    </div>

    ${addState.type !== 'url' ? `
    <div class="card">
      <div class="row between" style="margin-bottom:12px">
        <div class="section-label" style="margin:0">Marketplace</div>
        <button class="btn-ghost" style="color:var(--amber)" data-toggle-all-mkt>${allSel ? 'Deseleziona tutti' : 'Seleziona tutti'}</button>
      </div>
      <div class="mkt-grid">
        ${mktCodes.map(c => `
          <button class="mkt-opt ${addState.marketplaces.includes(c) ? 'sel' : ''}" data-add-mkt="${c}">
            ${MARKETPLACES[c].flag} <span style="font-family:monospace; font-size:12px">${c}</span>
          </button>`).join("")}
      </div>
    </div>` : ""}

    ${addState.type !== 'asin' ? `
    <div class="card">
      <div class="section-label">Filtri</div>
      <div class="row between" style="margin-bottom:14px">
        <div>
          <div style="font-size:13px; color:#fff">Solo venduto da Amazon</div>
          <div style="font-size:11px; color:var(--muted); margin-top:2px">Esclude venditori terzi e scalper</div>
        </div>
        <button class="toggle ${addState.soldByAmazon ? 'on' : ''}" id="add-sold-toggle"><span class="knob"></span></button>
      </div>
      <div style="padding-top:12px; border-top:1px solid var(--card-border)">
        <div style="font-size:11px; color:var(--muted); margin-bottom:8px">Tipo di ricerca</div>
        <div class="row" style="gap:8px">
          ${[["normal","Normale"],["deals","⚡ Offerte"],["new","🆕 Novità"]].map(([id,label]) => `
            <button class="pill" style="cursor:pointer; border:1px solid ${addState.searchType===id?'#F59E0B80':'var(--card-border)'}; background:${addState.searchType===id?'var(--amber-soft)':'transparent'}; color:${addState.searchType===id?'#FCD34D':'#9CA3AF'}; padding:6px 12px" data-add-stype="${id}">${label}</button>
          `).join("")}
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="section-label">Frequenza di check</div>
      <div class="row" style="gap:8px; flex-wrap:wrap">
        ${[["","Usa impostazione globale"],["30","30 secondi"],["60","1 minuto"],["120","2 minuti"],["300","5 minuti"]].map(([val,label]) => `
          <button class="pill" style="cursor:pointer; border:1px solid ${addState.pollInterval===val?'#F59E0B80':'var(--card-border)'}; background:${addState.pollInterval===val?'var(--amber-soft)':'transparent'}; color:${addState.pollInterval===val?'#FCD34D':'#9CA3AF'}; padding:6px 12px" data-add-interval="${val}">${label}</button>
        `).join("")}
      </div>
    </div>

    <div id="add-error" class="error-msg"></div>
    <button class="btn btn-primary" id="add-save-btn">${addState.editId ? 'Aggiorna Monitor' : 'Salva Monitor'}</button>
  `;
}

// ── Bundles ────────────────────────────────────────────────────────────────

function renderBundleTooltip(b) {
  const sortLabel = { new: "📅 Più recenti prima", deals: "⚡ Filtra badge sconto", normal: "🔀 Rilevanza Amazon" }[b.search_type] || b.search_type;
  const sellerLabel = b.sold_by_amazon ? "🏪 Solo venduto da Amazon" : "👥 Tutti i venditori";
  const mkts = b.marketplaces.map(c => { const m = MARKETPLACES[c]; return m ? `${m.flag} ${c}` : c; }).join(" · ");
  return `<div class="tooltip-box">
    <div style="color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px">Configurazione ricerca</div>
    <div style="margin-bottom:4px">🔍 <span style="color:var(--amber); font-family:monospace">"${b.keyword}"</span></div>
    <div style="margin-bottom:4px">${sortLabel}</div>
    <div style="margin-bottom:8px">${sellerLabel}</div>
    <div style="color:var(--muted); font-size:11px">${mkts}</div>
  </div>`;
}

function renderBundleMktChips(b) {
  return Object.keys(MARKETPLACES).map(c => {
    const sel = b.marketplaces.includes(c);
    const m = MARKETPLACES[c];
    return `<button class="mkt-opt ${sel ? 'sel' : ''}" style="padding:5px 9px"
      data-bundle-mkt="${b.id}" data-mkt="${c}">
      ${m.flag} <span style="font-family:monospace;font-size:11px">${c}</span>
    </button>`;
  }).join("");
}

function renderBundles() {
  return `
    <h1>Pacchetti</h1>
    <p class="subtitle">Bundle predefiniti. Attivali con un click e seleziona i marketplace.</p>
    ${state.bundles.map(b => `
      <div class="card" style="border-color:${b.enabled ? '#F59E0B40' : 'var(--card-border)'}">
        <div class="row" style="gap:12px; align-items:flex-start">
          <span style="font-size:22px">${b.icon}</span>
          <div style="flex:1; min-width:0">
            <div class="row between" style="margin-bottom:4px">
              <div class="row" style="gap:6px; min-width:0">
                <span style="font-size:13px; font-weight:500; color:#fff">${b.name}</span>
                <span class="tooltip-wrap">
                  <span style="font-size:13px; color:var(--muted); cursor:default; user-select:none; line-height:1">ⓘ</span>
                  ${renderBundleTooltip(b)}
                </span>
              </div>
              <button class="toggle ${b.enabled ? 'on' : ''}" data-toggle-bundle="${b.id}"><span class="knob"></span></button>
            </div>
            <p style="font-size:12px; color:var(--muted); margin:0 0 8px">${b.description}</p>
            <div style="margin-bottom:10px"><span class="detail-label" style="font-size:11px; color:var(--muted)">Cerca </span><span class="kw-pill">${b.keyword}</span></div>
            <div class="mkt-grid" style="grid-template-columns:repeat(6,1fr)">${renderBundleMktChips(b)}</div>
            ${b.found_count > 0 ? `<div style="margin-top:8px"><span class="pill" style="background:rgba(16,185,129,0.1); color:var(--green)">${b.found_count} prodotti trovati</span></div>` : ""}
          </div>
        </div>
      </div>
    `).join("")}
  `;
}

// ── Blacklist ──────────────────────────────────────────────────────────────

function renderBlacklist() {
  return `
    <h1>Blacklist</h1>
    <p class="subtitle">Prodotti bloccati — nessuna notifica per questi ASIN</p>

    <div class="card">
      <div class="section-label">Aggiungi manualmente</div>
      <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap">
        <input type="text" id="bl-asin" placeholder="ASIN (es. B0D91K2WMS)" style="flex:1; min-width:140px; margin:0; font-family:monospace; text-transform:uppercase">
        <input type="text" id="bl-title" placeholder="Etichetta opzionale" style="flex:2; min-width:160px; margin:0">
        <button class="btn" id="bl-add-btn" style="background:var(--red); color:#fff; white-space:nowrap">Blocca</button>
      </div>
      <div id="bl-error" class="error-msg"></div>
    </div>

    <div class="card" style="padding:0">
      <div style="padding:14px 16px" class="section-label">ASIN bloccati (${state.blacklist.length})</div>
      ${state.blacklist.length === 0
        ? '<div class="empty">Nessun ASIN in blacklist</div>'
        : state.blacklist.map(item => `
          <div class="row between" style="padding:12px 16px; border-bottom:1px solid var(--line)">
            <div style="min-width:0; flex:1">
              <div style="font-size:13px; color:#fff; font-family:monospace">${item.asin}</div>
              <div style="font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${item.title !== item.asin ? item.title : ''}</div>
              <div style="font-size:10px; color:var(--dim); margin-top:2px">${new Date(item.added_at).toLocaleString('it-IT')}</div>
            </div>
            <button class="btn-ghost" data-delete-blacklist="${item.asin}" title="Rimuovi da blacklist">✕</button>
          </div>`).join('')}
    </div>
  `;
}

// ── Settings ───────────────────────────────────────────────────────────────

function renderSettings() {
  const s = state.settings;
  return `
    <h1>Impostazioni</h1>
    <p class="subtitle">Notifiche e frequenza di check</p>

    <div class="card">
      <div class="row between" style="margin-bottom:16px">
        <div class="row" style="gap:8px"><span style="font-size:17px">✈️</span><span style="font-size:13px; font-weight:500; color:#fff">Telegram</span></div>
        <span class="pill" style="background:rgba(16,185,129,0.15); color:var(--green)">${s.telegram_token ? 'Configurato' : 'Da configurare'}</span>
      </div>
      <label class="field-label">Bot Token</label>
      <div class="row" style="gap:8px; margin-bottom:12px">
        <input type="password" id="set-token" value="${s.telegram_token || ''}" placeholder="es. 123456:AAF..." style="flex:1; margin:0">
        <button id="toggle-token-visibility" class="btn-ghost" style="color:var(--muted); font-size:16px; padding:0 8px" title="Mostra/nascondi token">👁</button>
      </div>
      <label class="field-label">Chat ID</label>
      <input type="text" id="set-chatid" value="${s.telegram_chat_id || ''}" placeholder="es. 987654321">
      <button class="btn-ghost" style="color:var(--amber); margin-top:10px" id="test-telegram-btn">Invia messaggio di prova →</button>
    </div>

    <div class="card" style="opacity:.5; border-style:dashed">
      <div class="row between">
        <div class="row" style="gap:8px"><span style="font-size:17px">🔔</span><span style="font-size:13px; font-weight:500; color:#9CA3AF">Pushover</span></div>
        <span class="pill" style="background:#252932; color:var(--muted)">Prossimamente</span>
      </div>
      <p style="font-size:11px; color:var(--dim); margin:8px 0 0">Notifiche ad alta priorità che bypassano il silenzioso</p>
    </div>

    <div class="card">
      <div class="section-label">Frequenza di check</div>
      <div class="row" style="gap:12px">
        <input type="range" min="30" max="300" step="30" value="${s.poll_interval_seconds || 60}" id="set-interval" style="flex:1; accent-color:var(--amber)">
        <span id="interval-display" style="font-family:monospace; color:var(--amber); width:50px; text-align:right">${s.poll_interval_seconds || 60}s</span>
      </div>
      <div class="row between" style="font-size:11px; color:var(--dim); margin-top:4px">
        <span>30s — aggressivo</span><span>5 min — leggero</span>
      </div>
    </div>

    <button class="btn btn-primary" id="settings-save-btn">Salva impostazioni</button>
  `;
}

// ── Event handlers ───────────────────────────────────────────────────────────

function attachHandlers() {
  document.querySelectorAll("[data-nav]").forEach(el =>
    el.onclick = () => {
      if (el.dataset.nav === "add") addState = { editId: null, type: "keyword", name: "", keyword: "", url: "", marketplaces: ["JP"], soldByAmazon: true, searchType: "new", pollInterval: "" };
      setSection(el.dataset.nav);
    });

  // Monitors
  document.querySelectorAll("[data-toggle-monitor]").forEach(el =>
    el.onclick = async () => {
      const id = el.dataset.toggleMonitor;
      const m = state.monitors.find(x => x.id == id);
      await api(`/api/monitors/${id}`, { method: "PUT", body: JSON.stringify({ enabled: !m.enabled }) });
      await loadAll();
    });
  document.querySelectorAll("[data-delete-monitor]").forEach(el =>
    el.onclick = async () => {
      if (!confirm("Eliminare questo monitor?")) return;
      await api(`/api/monitors/${el.dataset.deleteMonitor}`, { method: "DELETE" });
      await loadAll();
    });
  document.querySelectorAll("[data-edit-monitor]").forEach(el =>
    el.onclick = () => {
      const m = state.monitors.find(x => x.id == el.dataset.editMonitor);
      addState = {
        editId: m.id,
        type: m.type,
        name: m.name,
        keyword: m.keyword || "",
        url: m.url || "",
        marketplaces: m.marketplaces || [],
        soldByAmazon: m.sold_by_amazon,
        searchType: m.search_type,
        pollInterval: m.poll_interval_seconds ? String(m.poll_interval_seconds) : "",
      };
      setSection("add");
    });

  // Bundles
  document.querySelectorAll("[data-toggle-bundle]").forEach(el =>
    el.onclick = async () => {
      const id = el.dataset.toggleBundle;
      const b = state.bundles.find(x => x.id === id);
      await api(`/api/bundles/${id}`, { method: "PUT", body: JSON.stringify({ enabled: !b.enabled }) });
      await loadAll();
    });
  document.querySelectorAll("[data-bundle-mkt]").forEach(el =>
    el.onclick = async () => {
      const id = el.dataset.bundleMkt;
      const mkt = el.dataset.mkt;
      const b = state.bundles.find(x => x.id === id);
      const updated = b.marketplaces.includes(mkt)
        ? b.marketplaces.filter(x => x !== mkt)
        : [...b.marketplaces, mkt];
      await api(`/api/bundles/${id}`, { method: "PUT", body: JSON.stringify({ marketplaces: updated }) });
      await loadAll();
    });

  // Add monitor
  document.querySelectorAll("[data-add-type]").forEach(el =>
    el.onclick = () => { addState.type = el.dataset.addType; render(); });
  document.querySelectorAll("[data-add-mkt]").forEach(el =>
    el.onclick = () => {
      const c = el.dataset.addMkt;
      addState.marketplaces = addState.marketplaces.includes(c)
        ? addState.marketplaces.filter(x => x !== c) : [...addState.marketplaces, c];
      render();
    });
  const toggleAllBtn = document.querySelector("[data-toggle-all-mkt]");
  if (toggleAllBtn) toggleAllBtn.onclick = () => {
    const all = Object.keys(MARKETPLACES);
    addState.marketplaces = addState.marketplaces.length === all.length ? [] : all;
    render();
  };
  document.querySelectorAll("[data-add-stype]").forEach(el =>
    el.onclick = () => { addState.searchType = el.dataset.addStype; render(); });
  document.querySelectorAll("[data-add-interval]").forEach(el =>
    el.onclick = () => { addState.pollInterval = el.dataset.addInterval; render(); });
  const soldToggle = document.getElementById("add-sold-toggle");
  if (soldToggle) soldToggle.onclick = () => { addState.soldByAmazon = !addState.soldByAmazon; render(); };

  const nameInput = document.getElementById("add-name");
  if (nameInput) nameInput.oninput = e => addState.name = e.target.value;
  const valueInput = document.getElementById("add-value");
  if (valueInput) valueInput.oninput = e => {
    if (addState.type === "url") addState.url = e.target.value;
    else addState.keyword = e.target.value;
  };

  const saveBtn = document.getElementById("add-save-btn");
  if (saveBtn) saveBtn.onclick = async () => {
    const errorEl = document.getElementById("add-error");
    errorEl.textContent = "";
    const payload = {
      name: addState.name, type: addState.type,
      keyword: addState.keyword, url: addState.url,
      marketplaces: addState.marketplaces,
      sold_by_amazon: addState.soldByAmazon,
      search_type: addState.searchType,
      poll_interval_seconds: addState.pollInterval ? parseInt(addState.pollInterval) : null,
    };
    try {
      if (addState.editId) {
        await api(`/api/monitors/${addState.editId}`, { method: "PUT", body: JSON.stringify(payload) });
        toast("Monitor aggiornato ✓");
      } else {
        await api("/api/monitors", { method: "POST", body: JSON.stringify({ ...payload, enabled: true }) });
        toast("Monitor salvato ✓");
      }
      addState = { editId: null, type: "keyword", name: "", keyword: "", url: "", marketplaces: ["JP"], soldByAmazon: true, searchType: "new", pollInterval: "" };
      state.section = "monitors";
      await loadAll();
    } catch (e) {
      errorEl.textContent = e.message;
    }
  };

  // Blacklist
  const blAddBtn = document.getElementById("bl-add-btn");
  if (blAddBtn) blAddBtn.onclick = async () => {
    const asin = (document.getElementById("bl-asin").value || "").trim().toUpperCase();
    const title = (document.getElementById("bl-title").value || "").trim();
    const errorEl = document.getElementById("bl-error");
    errorEl.textContent = "";
    if (!asin) { errorEl.textContent = "ASIN obbligatorio"; return; }
    try {
      await api("/api/blacklist", { method: "POST", body: JSON.stringify({ asin, title }) });
      toast("ASIN bloccato ✓");
      await loadAll();
    } catch (e) { errorEl.textContent = e.message; }
  };
  document.querySelectorAll("[data-delete-blacklist]").forEach(el =>
    el.onclick = async () => {
      if (!confirm("Rimuovere dalla blacklist?")) return;
      await api(`/api/blacklist/${el.dataset.deleteBlacklist}`, { method: "DELETE" });
      toast("Rimosso dalla blacklist ✓");
      await loadAll();
    });

  // Settings
  const intervalSlider = document.getElementById("set-interval");
  if (intervalSlider) intervalSlider.oninput = e =>
    document.getElementById("interval-display").textContent = e.target.value + "s";

  const settingsSaveBtn = document.getElementById("settings-save-btn");
  if (settingsSaveBtn) settingsSaveBtn.onclick = async () => {
    await api("/api/settings", {
      method: "PUT",
      body: JSON.stringify({
        telegram_token: document.getElementById("set-token").value,
        telegram_chat_id: document.getElementById("set-chatid").value,
        poll_interval_seconds: document.getElementById("set-interval").value,
      }),
    });
    toast("Impostazioni salvate ✓");
    await loadAll();
  };

  const toggleVisBtn = document.getElementById("toggle-token-visibility");
  if (toggleVisBtn) toggleVisBtn.onclick = () => {
    const input = document.getElementById("set-token");
    input.type = input.type === "password" ? "text" : "password";
  };

  const testBtn = document.getElementById("test-telegram-btn");
  if (testBtn) testBtn.onclick = async () => {
    testBtn.textContent = "Invio in corso...";
    try {
      const res = await api("/api/settings/test-telegram", {
        method: "POST",
        body: JSON.stringify({
          telegram_token: document.getElementById("set-token").value,
          telegram_chat_id: document.getElementById("set-chatid").value,
        }),
      });
      toast(res.ok ? "Messaggio inviato ✓ controlla Telegram" : "Invio fallito — controlla token/chat ID");
    } catch (e) { toast("Errore: " + e.message); }
    testBtn.textContent = "Invia messaggio di prova →";
  };
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────

loadAll();
setInterval(() => {
  if (state.section !== "settings" && state.section !== "add") loadAll();
}, 15000); // refresh dati ogni 15s — sospeso su Settings e Aggiungi Monitor per non perdere input non salvati
</script>
</body>
</html>
